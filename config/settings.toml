# brainrotbot configuration (step 1: Reddit retrieval + cleaning).

[reddit]
# Subreddits to pull self/text stories from. These are the classic "brainrot" story sources.
subreddits = [
    "AmItheAsshole",
    "tifu",
    "confession",
    "relationship_advice",
    "stories",
]
time_filter = "week"   # one of: hour, day, week, month, year, all
limit_per_sub = 25     # candidate posts pulled per subreddit before filtering

[selection]
min_score = 500        # minimum upvotes to be eligible
allow_nsfw = false     # skip posts flagged over_18 when false
# Length bounds, derived from a 30-90s target read at ~150 wpm (~2.5 words/sec).
min_words = 75
max_words = 350
top_k = 5              # number of stories to keep per pipeline run

[text]
prepend_title = true   # use the post title as the spoken hook
strip_edits = true     # drop "Edit:" / "Update:" trailer lines
strip_tldr = true      # drop "TL;DR" lines

[tts]
engine = "kokoro"
default_lang = "a"     # Kokoro lang_code; 'a' = American English (default for English subs)
device = "auto"        # auto | cpu | cuda
speed = 1.15           # narration speed multiplier
sample_rate = 24000    # Kokoro's native rate; do not change

# Voice pools rotated over per story for A/B testing; chosen voice+lang logged in the ledger.
# Keyed by Kokoro lang_code. 'a' (English) is required; others used for non-English stories
# (we plan to translate posts to Japanese 'j' / Chinese 'z' later).
[tts.voices]
a = ["af_heart", "af_bella", "am_michael", "am_fenrir"]   # American English
b = ["bf_emma", "bm_george"]                               # British English
e = ["ef_dora", "em_alex"]                                 # Spanish

[video]
# Curated pool of long gameplay videos. Rotated per story (A/B testing, like the TTS voices)
# and downloaded + cached once to data/video_cache/ (keyed by URL hash), reused across runs.
# Replace/extend with your own no-copyright gameplay sources.
sources = [
    "https://www.youtube.com/watch?v=n_Dv4JMiwK8",   # Minecraft parkour (no-copyright gameplay)
    "https://www.youtube.com/watch?v=u7kdVe8q5zs",   # Subway Surfers (no-copyright gameplay)
    "https://www.youtube.com/watch?v=zCoCOHOYd28",   # Train video 
]
max_source_height = 1080   # cap download resolution (keeps cache small)
width = 1080               # output frame -- TikTok vertical 9:16
height = 1920
fps = 30                   # output frame rate
crf = 23                   # libx264 quality (lower = better/larger)
preset = "veryfast"        # libx264 speed/size trade-off
# Motion sampling: score the source's keyframes (downscaled to grayscale) and pick the
# highest-motion window the length of the narration.
sample_width = 64          # downscale width  for motion sampling
sample_height = 36         # downscale height for motion sampling

[paths]
data_dir = "data"
stories_subdir = "stories"
audio_subdir = "audio"
video_subdir = "video"
video_cache_subdir = "video_cache"
ledger_file = "ledger.jsonl"
banned_words_file = "resources/banned_words.toml"
