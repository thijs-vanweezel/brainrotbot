# brainrotbot configuration (step 1: Reddit retrieval + cleaning).

[reddit]
# Subreddits to pull self/text stories from. These are the classic "brainrot" story sources.
subreddits = [
    "AmItheAsshole",
    "tifu",
    "confession",
    "relationship_advice",
    "stories",
    "offmychest",
    "nosleep",
    "adultery",
]
time_filter = "week"   # one of: hour, day, week, month, year, all
limit_per_sub = 25     # candidate posts pulled per subreddit before filtering

[selection]
min_score = 500        # minimum upvotes to be eligible
allow_nsfw = false     # skip posts flagged over_18 when false
# Length bounds, derived from a 30-90s target read at ~150 wpm (~2.5 words/sec).
min_words = 75
max_words = 350
top_k = 30              # number of stories to keep per pipeline run

[text]
prepend_title = true   # use the post title as the spoken hook
strip_edits = true     # drop "Edit:" / "Update:" trailer lines
strip_tldr = true      # drop "TL;DR" lines

[tts]
engine = "kokoro"
default_lang = "a"     # Kokoro lang_code; 'a' = American English (default for English subs)
device = "auto"        # auto | cpu | cuda
speed = 1.15           # narration speed multiplier
sample_rate = 24000    # Kokoro's native rate; do not change

# Voice pools rotated over per story for A/B testing; chosen voice+lang logged in the ledger.
# Keyed by Kokoro lang_code. 'a' (English) is required; others used for non-English stories
# (we plan to translate posts to Japanese 'j' / Chinese 'z' later).
[tts.voices]
a = ["af_heart", "af_bella", "am_michael", "am_fenrir"]   # American English
b = ["bf_emma", "bm_george"]                               # British English
e = ["ef_dora", "em_alex"]                                 # Spanish

[video]
# Curated pool of long gameplay videos. Rotated per story (A/B testing, like the TTS voices)
# and downloaded + cached once to data/video_cache/ (keyed by URL hash), reused across runs.
# Replace/extend with your own no-copyright gameplay sources.
sources = [
    "https://www.youtube.com/watch?v=i0M4ARe9v0Y",   # Subway Surfers, 5 mins
    "https://www.youtube.com/watch?v=Vqvk5wyARtk",   # Subway surfers, 10 mins
    "https://www.youtube.com/watch?v=pIkYLpWdZXM",   # Subway surfers, 15 mins
    "https://www.youtube.com/watch?v=9S8mIJjJBzg",   # GTA-V mega ramp, 6 mins 
    "https://www.youtube.com/watch?v=reeAD8jAReA",   # GTA-V mega ramp, 8 mins
    "https://www.youtube.com/watch?v=Ieli25pQQEI",   # GTA-V mega ramp, 11 mins
    "https://www.youtube.com/watch?v=BXUA2FncVPI",   # Minecraft parkour, 10 mins 
    "https://www.youtube.com/watch?v=5kdkBv1LqbM",   # Minecraft parkour, 10 mins
    "https://www.youtube.com/watch?v=r2TAtdDpg3Y",   # Minecraft parkour, 10 mins
    "https://www.youtube.com/watch?v=G0hstDxy8Gc",   # Train video, 18 mins
    "https://www.youtube.com/watch?v=UurvHfRALY4",   # Train video, 5 mins
    "https://www.youtube.com/watch?v=ceBRUwCk_J8",   # Train video, 10 mins
    "https://www.youtube.com/watch?v=ZJDn89O_dTI",   # Food video, 4 mins
    "https://www.youtube.com/watch?v=VAGmUv___iQ",   # Food video, 10 mins
]
max_source_height = 1080   # cap download resolution (keeps cache small)
width = 1080               # output frame -- TikTok vertical 9:16
height = 1920
fps = 30                   # output frame rate
crf = 23                   # libx264 quality (lower = better/larger)
preset = "veryfast"        # libx264 speed/size trade-off
# A window the length of the narration is trimmed from a random offset in the source,
# starting no earlier than intro_skip_sec to skip the source's intro/title card.
intro_skip_sec = 5
# Clearing YouTube's "confirm you're not a bot" gate needs logged-in cookies. Two ways:
#   cookies_file        -- path to a Netscape cookies.txt (export once with a browser extension
#                          like "Get cookies.txt LOCALLY"). Most reliable on Windows. Wins if set.
#   cookies_from_browser-- "" (off) | "edge" | "chrome" | "firefox" | "brave". Reads the browser's
#                          cookie DB directly, but the browser must be CLOSED (it locks the DB).
cookies_file = "./yt_cookies.txt"
cookies_from_browser = "edge"

[edit]
# Step 4 assembles the final upload-ready video: narration muxed onto the background clip,
# then a standard "follow our page" outro shot appended. Output: data/final/<post_id>.mp4.
# Geometry (width/height/fps) is reused from [video] so the outro matches the background frame.
# Standard outro shot appended after the narration. A 9:16 video or image; "" disables it
# (final video is then just the narrated background). Resolved relative to the project root.
outro_file = "resources/outro.mp4"
outro_duration_sec = 4     # how long an image outro is shown (ignored for video outros)
crf = 23                   # libx264 quality for the re-encoded final (lower = better/larger)
preset = "veryfast"        # libx264 speed/size trade-off
# Step 5 -- soft background music bed sourced randomly from ncs.io (instrumental versions only).
# Catalogue is scraped from /music-search?version=Instrumental and cached to disk; each pick
# downloads /track/download/i_<tid> (always the no-vocals cut). Mixed into the existing compose
# pass so we don't re-encode the video a second time -- both compose paths (mux-only / outro
# concat) gain the same sidechain-duck + amix audio branch. --skip-music turns the whole step
# off (mux-only then keeps its fast `-c:v copy` audio re-encode-only path).
music_enabled = true
music_volume_db = -24            # bed level under the narration (negative = softer)
music_duck = true                # sidechain-compress the bed when the narration is speaking
music_catalogue_ttl_days = 7     # re-scrape NCS after this many days (cache freshness only -- not throttling)
music_catalogue_pages = 3        # how many listing pages to scrape (~21 tracks/page; 3 = plenty of variety)
music_intro_skip_sec = 5         # floor on the random start offset into the track (NCS intros are often quiet)

[thumbnail]
# Step 6 -- a 9:16 cover image per video: a random Pixabay background with the post title
# overlaid (white bold text + dark stroke on a soft scrim band, no subreddit chrome). Output:
# data/thumbnail/<post_id>.png, consumed by the upload step. Geometry reuses [video] width/height.
enabled = true
font_file = "resources/Anton-Regular.ttf"  # falls back to Arial Bold, then PIL default if missing
font_max_size = 110        # title auto-shrinks from here to fit the text box
stroke_width = 6           # dark outline around the white title for legibility on any image
scrim_opacity = 0          # darkened band behind the text (0 = none, 1 = opaque)

# Curated background search terms grouped by category. A random category is chosen per story,
# then a random term within it; both land in the ledger (assets.thumbnail) for A/B analysis.
[thumbnail.search_terms]
luxury = ["luxury car", "mansion", "real estate", "money", "private jet", "luxury watch"]
people = ["portrait woman", "fashion model", "man portrait", "beautiful face", "sexy woman", "serious woman", "make-up woman"]
nature = ["landscape", "beach sunset", "mountains", "tropical"]
food = ["gourmet burger", "dessert", "pizza", "snacks", "sushi"]

[upload]
# Step 7 -- post finished videos to TikTok by driving the web Studio uploader with Playwright
# (the official API can't toggle subtitles and forces private-only posts for unaudited apps). Videos
# are NOT uploaded one-by-one as they're made: the pipeline drains the ready-queue in batches -- after
# every `batch_size` created videos, or once the requested top_k is reached, whichever comes first.
# Log in once with `run.bat --tiktok-login` (a Chromium window opens; the session persists in the
# profile dir below). --skip-upload skips the step; enabled=false also disables it; --upload-only
# flushes the queue without creating anything new.
enabled = true
batch_size = 30                  # drain the ready-queue after this many newly-created videos
# Auth is by IMPORTED COOKIES, not automated login: TikTok bot-walls the login flow ("maximum
# attempts reached") regardless of engine/credentials. While logged into TikTok in your normal
# browser, export tiktok.com cookies with the "Get cookies.txt LOCALLY" extension (the same tool
# used for yt_cookies.txt) and save next to this file. Verify with `run.bat --tiktok-check`.
cookies_file = "./tiktok_cookies.txt"
browser = "firefox"             # playwright engine: chromium | firefox | webkit. Firefox trips
                                 # TikTok's login bot-detection ("maximum attempts reached") less
                                 # than Chromium. After changing this, re-run `run.bat --tiktok-login`
                                 # (each engine keeps its own profile under config/tiktok_profile/<engine>/).
                                 # Install the engine once: `playwright install firefox`.
headless = false                 # headed browser is far more reliable against TikTok's bot checks
upload_url = "https://www.tiktok.com/tiktokstudio/upload"
privacy = "public"               # "public" posts live; anything else leaves visibility as-is
subtitles = true                 # turn ON TikTok's auto-generated captions in the UI
set_cover = true                 # best-effort: use the Step 6 thumbnail PNG as the TikTok cover
caption_template = "{title}"     # caption body; hashtags below are appended
hashtags = ["#fyp", "#storytime", "#reddit"]
delete_after_upload = true       # delete this post's final/background/audio/thumbnail once uploaded
                                 # (keeps the JSON record + shared caches for Step 8 analytics)
nav_timeout_sec = 120            # per-action Playwright timeout (uploads/processing can be slow)
# After Post, wait up to this long for the post to land. RECOMMENDED: turn OFF "Content Check Lite" in
# TikTok Studio (profile -> Settings) -- it runs a ~10 min pre-post check that spawns confirmation modals
# and makes automation flaky. With it off, posts complete in seconds; with it on, raise this to ~720.
completion_timeout_sec = 600
debug = false                    # dump Studio DOM (screenshot+HTML) per milestone to data/upload_debug
session_subdir = "tiktok_profile"  # persistent browser profile under config/ (gitignored)

[paths]
data_dir = "data"
stories_subdir = "stories"
audio_subdir = "audio"
video_subdir = "video"
video_cache_subdir = "video_cache"
final_subdir = "final"
music_cache_subdir = "music_cache"
thumbnail_subdir = "thumbnail"
thumbnail_cache_subdir = "thumbnail_cache"
ledger_file = "ledger.jsonl"
banned_words_file = "resources/banned_words.toml"
