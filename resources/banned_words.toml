# TikTok-sensitive words, per language. These are NOT replaced: the narration speaks the real word
# while a blur SFX is laid over its spoken interval (tts/censor.py), and the burned-in caption shows
# the word with its FIRST vowel asterisked ("fuck" -> "f*ck", text/censor.py). Matched whole-word and
# case-insensitively on each word's letter-core (surrounding punctuation ignored; accents kept), so
# list the inflections you care about explicitly. The bot picks the list matching each video's
# language (Step 1.5 fan-out); a language with no list here is left uncensored. Edit freely -- data.
#
# NOTE: is_banned() matches a SINGLE whitespace token, so multi-word phrases are dead entries.
# Use the individual tokens instead (e.g. "masturbate" not "jerk off").
#
# Legacy forms still load: a flat `words = [...]` or a `[replacements]` table both map to `en`.

