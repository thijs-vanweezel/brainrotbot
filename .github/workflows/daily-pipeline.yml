name: Daily brainrotbot run

# Runs the full pipeline (Reddit -> TTS -> video -> edit -> captions -> music -> thumbnail ->
# Zernio-scheduled TikTok upload) once a day, top_k=5. Upload goes through Zernio's REST API
# (see src/brainrotbot/upload/zernio.py) -- no browser, no TikTok cookies, no bot-detection risk.
# Background-video sourcing (yt-dlp against YouTube) still needs cookies + a JS runtime, see below.
on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC daily -- adjust to taste
  workflow_dispatch: {}    # manual "Run workflow" button for testing

permissions:
  contents: write   # to commit the updated ledger/story state back to the repo

concurrency:
  group: brainrotbot-daily
  cancel-in-progress: false   # never cancel a run that might already be mid-upload

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # CPU-only: TTS/alignment/encoding are slower than on a GPU box; raise if runs get truncated
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # Kokoro TTS requires <3.13, same constraint as the conda env locally

      # yt-dlp needs a JS runtime to clear YouTube's "confirm you're not a bot" challenge
      # (locally this is conda-forge's Deno; CLAUDE.md Step 3 notes).
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Speeds up re-runs: pip wheels + downloaded HF/Kokoro/MMS/NLLB model weights.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
          key: brainrotbot-modelcache-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            brainrotbot-modelcache-

      # Rolling cache for data/: video_cache, music_cache, thumbnail_cache, translation_cache
      # (pure reusable caches) plus any not-yet-reconciled media for videos Zernio has scheduled
      # but not yet published (upload_scheduled keeps its final/audio/video files until the next
      # run's reconcile confirms + deletes them). Losing this cache costs re-download time, not
      # correctness -- data/ledger.jsonl + data/stories/ (the real state) are committed to git below.
      - uses: actions/cache@v4
        with:
          path: data/
          key: brainrotbot-data-${{ github.run_id }}
          restore-keys: |
            brainrotbot-data-

      - name: Install brainrotbot
        run: pip install -e ".[tts,video,music,subtitles,translation,thumbnail]"
        # NOT the "upload" extra: the default Zernio provider only needs `requests` (core);
        # Playwright is only required for the legacy provider="playwright" fallback.

      - name: Write YouTube cookies
        run: printf '%s' "${{ secrets.YT_COOKIES }}" > yt_cookies.txt
        # Netscape cookies.txt exported from a logged-in browser (same file used locally),
        # stored whole as the YT_COOKIES repo secret. Re-export + update the secret if
        # background-video downloads start failing (YouTube cookies do expire over time).

      - name: Run pipeline (top_k=5)
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
        run: python -m brainrotbot.pipeline --top-k 5

      - name: Commit updated ledger + story state
        if: always()   # commit whatever progress was made even if a later story/step failed
        run: |
          git config user.name "brainrotbot"
          git config user.email "actions@users.noreply.github.com"
          [ -f data/ledger.jsonl ] && git add -f data/ledger.jsonl
          [ -d data/stories ] && git add -f data/stories/
          git diff --cached --quiet || git commit -m "chore: update ledger/story state [skip ci]"
          git push
