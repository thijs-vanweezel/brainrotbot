# Conda environment for brainrotbot.
# The active dev env ("brainrotbot") runs Python 3.13; step-1 deps below are all 3.13-compatible.
# Reddit retrieval uses RSS (requests + stdlib xml.etree) -- no API client needed.
# Heavier deps (torch / TTS / yt-dlp) are intentionally deferred to later pipeline steps.
name: brainrotbot
channels:
  - conda-forge
dependencies:
  - python>=3.11
  - pip
  - requests>=2.31
  - python-dotenv>=1.0   # reserved for the future TikTok-secrets step
  - pip:
      - pytest>=8.0
